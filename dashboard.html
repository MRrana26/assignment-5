<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker</title>

    <!-- fav icon added -->
    <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">

    <!-- daisyui and tailwind added -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome added  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- google font added  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- style added -->
    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body class="bg-[#E4E4E7]">
    <header class="bg-white shadow-sm p-5 sm:flex justify-between items-center space-y-2">

        <div class="flex gap-2 items-center">
            <img class="w-9" src="assets/github-logo.png" alt="">
            <h2 class="text-xl sm:text-2xl font-semibold">GitHub Issues Tracker</h2>
        </div>


        <div class="flex gap-2 pt-3 sm:pt-0">
            <label class="input">
                <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                        stroke="currentColor">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.3-4.3"></path>
                    </g>
                </svg>
                <input id="userTextUserInput" type="search" required placeholder="Search issues.." />
            </label>
            <button id="searchBtn" class="btn btn-primary">Search</button>
        </div>
    </header>

    <main class="w-[95%] sm:w-11/12 mx-auto px-1 sm:px-5 py-2 space-y-3">
        <div class="bg-white rounded-md px-6 py-3">
            <div class="flex gap-2">
                <button id="all" onclick="switchTab('all')" class="btn btn-primary">All</button>
                <button id="open" onclick="switchTab('open')" class="btn">Open</button>
                <button id="close" onclick="switchTab('close')" class="btn">Close</button>
            </div>
        </div>

        <div class="sm:flex justify-between items-center bg-white rounded-md px-3 sm:px-6 py-3 space-y-3">
            <div class="flex items-center  gap-2">
                <div class="p-1 bg-[#E4E4E7] rounded-full">
                    <img src="assets/Aperture.png" alt="">
                </div>
                <div class="gap-2">
                    <h1 class="text-[20px] font-semibold"><span id="issuesCount">0</span> Issues</h1>
                    <p class="text-[0.7rem] sm:text-[1rem] text-[#64748B]">Track and manage your project issues</p>
                </div>
            </div>

            <div class="flex gap-2">
                <p><i class="fa-solid fa-circle" style="color: #00A96E;"></i> Open</p>
                <p><i class="fa-solid fa-circle" style="color: #A855F7;"></i> Close</p>
            </div>
        </div>

        <div id="mainContainer" class="container grid grid-cols-1 sm:grid-cols-4 gap-3">

            <!-- card 01 -->
            <!-- <div class="card border-t-4 border-t-[#00A96E] bg-white p-4 space-y-3">

                    <h1 class="text-[#EF4444]">HIGH</h1>

                    <h2 class="text-[#64748B] text-[12px]">The navigation menu doesn't collapse properly on mobile

                </div>
                <div class="flex gap-3">
                    <div class="border border-[#FECACA] rounded-full px-2 py-1">
                        <p class="text-[0.8rem] text-[#EF4444]">
                            <i class="fa-solid fa-bug"></i> BUG
                        </p>
                    </div>
                    <div class="border border-[#FDE68A] rounded-full px-2 py-1">
                        <p class="text-[0.8rem] text-[#D97706]">

                    <p><small class="text-[#64748B]">1/15/2024</small></p>
                </div>
            </div> -->

        </div>

        <!--modal-->
        <dialog id="myModal" class="modal">
            <div class="modal-box space-y-2">
                <h3 id="titleModal" class="text-lg font-bold text-[1.5rem] text-[#1F2937]">Hello!</h3>
                <div class="sm:flex gap-2">
                    <button id="statusModal" class="bg-[#00A96E] text-white rounded-full px-2 py-1 text-[0.8rem]">Opened</button>
                    <p><small id="authorModal" class="text-[12px] text-[#64748B]">Opened by Fahim Ahmed</small></p>
                    <p><small id="createdAtModal" class="text-[12px] text-[#64748B]">22/02/2026</small></p>
                </div>

                <div class="flex gap-3 pt-3">
                    <div class="border border-[#FECACA] rounded-full px-2 py-1">
                        <p class="text-[1rem] text-[#EF4444]">
                            <i class="fa-solid fa-bug"></i> <span id="labelsModal"></span>
                        </p>
                    </div>

                    <div id="labelsModal2div" class="border border-[#FDE68A] rounded-full px-2 py-1">
                        <p id="labelsModal2icon" class="text-[1rem] text-[#D97706]">
                            <i class="fa-solid fa-life-ring"></i> <span id="labelsModal2"></span>
                        </p>
                    </div>

                </div>
                <p id="descriptionModal" class="text-[#64748B] text-[1rem]">The navigation menu doesn't collapse properly on mobile devices. Need to fix the responsive behavior.</p>

                <div class="grid sm:grid-cols-2 bg-[#F8FAFC] rounded-lg p-4 space-y-3">
                    <div class="grid grid-cols-2 sm:grid-cols-1">
                        <p class="text-[#64748B]">Assignee:</p>
                        <p id="assigneeModal" class="text-[#1F2937]">Fahim Ahmed</p>
                    </div>

                    <div class="grid grid-cols-2 sm:grid-cols-1">
                        <p class="text-[#64748B]">Priority:</p>
                        <button id="priorityModal" class="justify-self-start text-white bg-[#EF4444] rounded-full px-4 ">High</button>
                    </div>
                </div>
                <div class="modal-action">
                    <form method="dialog">
                        <!-- if there is a button in form, it will close the modal -->
                        <button class="btn btn-primary">Close</button>
                    </form>
                </div>
            </div>
        </dialog>


    </main>

    <script src="dashboard.js"></script>
</body>
