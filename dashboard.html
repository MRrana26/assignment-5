<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker</title>

    <!-- fav icon added -->
    <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">

    <!-- daisyui and tailwind added -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome added  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- google font added  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- style added -->
    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body class="bg-[#E4E4E7]">
    <header class="bg-white shadow-sm p-5 flex justify-between items-center">
        <div class="flex gap-2 items-center">
            <img class="w-9" src="assets/github-logo.png" alt="">
            <h2 class="text-2xl font-semibold">GitHub Issues Tracker</h2>
        </div>


        <div class="flex gap-2">
            <label class="input">
                <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                        stroke="currentColor">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.3-4.3"></path>
                    </g>
                </svg>
                <input type="search" required placeholder="Search issues.." />
            </label>
            <button class="btn btn-primary">Search</button>
        </div>
    </header>

    <main class="w-10/12 mx-auto px-5 py-2 space-y-3">
        <div class="bg-white rounded-md px-6 py-3">
            <div class="flex gap-2">
                <button class="btn btn-primary">All</button>
                <button class="btn">Open</button>
                <button class="btn">Close</button>
            </div>
        </div>

        <div class="flex justify-between items-center bg-white rounded-md px-6 py-3">
            <div class="flex items-center gap-2">
                <div class="p-1 bg-[#E4E4E7] rounded-full">
                    <img src="assets/Aperture.png" alt="">
                </div>
                <div class="gap-2">
                    <h1 class="text-[20px] font-semibold">50 Issues</h1>
                    <p class="text-[1rem] text-[#64748B]">Track and manage your project issues</p>
                </div>
            </div>

            <div class="flex gap-2">
                <p><i class="fa-solid fa-circle" style="color: #00A96E;"></i> Open</p>
                <p><i class="fa-solid fa-circle" style="color: #A855F7;"></i> Close</p>
            </div>
        </div>

        <div class="container grid grid-cols-4 gap-3">

            <div class="card border-t-4 border-t-[#00A96E] bg-white p-4 space-y-3">
                <div class="flex justify-between items-center">
                    <img src="assets/Open-Status.png" alt="">
                    <h1>HIGH</h1>
                </div>
                <div class="">
                    <h1 class="font-semibold text-[1rem]">Fix navigation menu on mobile devices</h1>
                    <h2 class="text-[#64748B] text-[12px]">The navigation menu doesn't collapse properly on mobile
                        devices...</h2>
                </div>

                <div class="flex gap-3">
                    <div class="border rounded-full px-2 py-1">
                        <p class="text-[0.8rem]">
                            <i class="fa-solid fa-bug"></i> BUG
                        </p>
                    </div>
                    <div class="border rounded-full px-2 py-1">
                        <p class="text-[0.8rem]">
                            <i class="fa-solid fa-life-ring"></i> HELP WANTED
                        </p>
                    </div>
                </div>

                <div class="opacity-30"><hr></div>
                <div class="">
                    <p><small>#1by john_doe</small></p>
                    <p><small>1/15/2024</small></p>
                </div>

            </div>



        </div>
    </main>

</body>

</html>
